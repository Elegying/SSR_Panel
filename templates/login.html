<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSR 管理面板 - 登录</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
    --primary: #2f6df6;
    --secondary: #15b8a6;
    --danger: #ff6b74;
    --bg-dark: #08111d;
    --bg-panel: rgba(8, 17, 31, 0.78);
    --border: rgba(255, 255, 255, 0.1);
    --text: #f4f7fb;
    --text-muted: #9eabc2;
}
body {
    position: relative;
    min-height: 100vh;
    padding: 24px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
    background:
        radial-gradient(circle at top left, rgba(47, 109, 246, 0.18), transparent 26%),
        radial-gradient(circle at 100% 0, rgba(21, 184, 166, 0.16), transparent 30%),
        linear-gradient(180deg, #08111d 0%, #0a1422 44%, #0c1727 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    overflow: hidden;
}
body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: linear-gradient(rgba(255,255,255,0.026) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.026) 1px, transparent 1px);
    background-size: 36px 36px;
    mask-image: linear-gradient(180deg, rgba(0,0,0,0.3), transparent 88%);
}
.login-container {
    position: relative;
    width: min(100%, 420px);
    padding: 30px;
    border-radius: 24px;
    background: linear-gradient(135deg, rgba(47, 109, 246, 0.14), rgba(21, 184, 166, 0.07)), var(--bg-panel);
    border: 1px solid var(--border);
    box-shadow: 0 28px 70px rgba(1, 8, 20, 0.42);
    backdrop-filter: blur(16px);
}
.login-container::after {
    content: "";
    position: absolute;
    inset: auto -56px -70px auto;
    width: 170px;
    height: 170px;
    border-radius: 999px;
    background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 68%);
    pointer-events: none;
}
.login-header {
    position: relative;
    margin-bottom: 24px;
}
.login-kicker {
    display: inline-flex;
    padding: 5px 10px;
    margin-bottom: 12px;
    border-radius: 999px;
    background: rgba(255,255,255,0.07);
    color: var(--text-muted);
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
}
.login-header h1 {
    font-size: clamp(1.65rem, 7vw, 2.1rem);
    line-height: 1.1;
    margin-bottom: 8px;
    letter-spacing: -0.04em;
}
.login-header p {
    color: var(--text-muted);
    font-size: 0.92rem;
}
.form-group {
    position: relative;
    margin-bottom: 16px;
}
.form-group label {
    display: block;
    margin-bottom: 7px;
    color: var(--text-muted);
    font-size: 0.86rem;
}
.form-group input {
    width: 100%;
    min-height: 46px;
    padding: 13px 14px;
    border-radius: 13px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(0,0,0,0.22);
    color: var(--text);
    font-size: 1rem;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
}
.form-group input:focus {
    border-color: rgba(47, 109, 246, 0.82);
    box-shadow: 0 0 0 4px rgba(47, 109, 246, 0.14);
    background: rgba(0,0,0,0.3);
}
.btn-login {
    width: 100%;
    min-height: 46px;
    padding: 13px;
    border-radius: 13px;
    border: none;
    background: linear-gradient(135deg, var(--primary), #79a8ff);
    color: white;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.25s, opacity 0.25s, box-shadow 0.25s;
    box-shadow: 0 14px 30px rgba(47, 109, 246, 0.26);
}
.btn-login:hover { transform: translateY(-1px); }
.btn-login:disabled {
    cursor: wait;
    opacity: 0.72;
    transform: none;
}
.error-msg {
    background: rgba(255,107,116,0.13);
    border: 1px solid rgba(255,107,116,0.32);
    color: #ff9aa1;
    padding: 11px 12px;
    border-radius: 12px;
    margin-bottom: 18px;
    text-align: center;
    font-size: 0.88rem;
}
@media (max-width: 480px) {
    body { padding: 14px; align-items: flex-start; padding-top: 12vh; }
    .login-container { padding: 22px; border-radius: 18px; }
    .login-header { margin-bottom: 20px; }
}
</style>
</head>
<body>
<div class="login-container">
    <div class="login-header">
        <div class="login-kicker">SSR Control Center</div>
        <h1>SSR 用户管理面板</h1>
        <p>请输入管理员账号登录</p>
    </div>
    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}
    <form method="POST" id="loginForm" autocomplete="on">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="form-group">
            <label for="username">用户名</label>
            <input id="username" type="text" name="username" placeholder="请输入用户名" autocomplete="username" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input id="password" type="password" name="password" placeholder="请输入密码" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">登 录</button>
    </form>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', function(){
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = '登录中...';
});
</script>
</body>
</html>
