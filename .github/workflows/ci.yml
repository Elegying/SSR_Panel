name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: ssr-admin-panel/requirements.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ssr-admin-panel/requirements.txt flake8

      - name: Compile and lint Python
        run: |
          python -m compileall -q ssr-admin-panel ssr-server-optimizer
          flake8 ssr-admin-panel ssr-server-optimizer \
            --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run unit and integration tests
        run: |
          (cd ssr-admin-panel && python -m unittest discover -s tests -q)
          (cd ssr-server-optimizer && python -m unittest discover -s tests -q)

  shell-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: false

      - name: Install ShellCheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck

      - name: Check shell syntax and severe findings
        run: |
          bash -n ssr-admin-panel/*.sh ssr-admin-panel/scripts/*.sh ssr-server-optimizer/*.sh
          shellcheck --severity=error \
            ssr-admin-panel/*.sh ssr-admin-panel/scripts/*.sh ssr-server-optimizer/*.sh

      - name: Validate GitHub Actions workflow
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          "$(go env GOPATH)/bin/actionlint"

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ssr-admin-panel/requirements.txt
      - name: Audit Python dependencies
        run: |
          python -m pip install --upgrade pip pip-audit
          python -m pip_audit -r ssr-admin-panel/requirements.txt

  distro-smoke:
    name: ${{ matrix.name }} smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu 22.04
            image: ubuntu:22.04
            bootstrap: >-
              apt-get update -qq &&
              DEBIAN_FRONTEND=noninteractive apt-get install -y -qq
              bash ca-certificates git python3 python3-pip python3-venv
          - name: Debian 12
            image: debian:12-slim
            bootstrap: >-
              apt-get update -qq &&
              DEBIAN_FRONTEND=noninteractive apt-get install -y -qq
              bash ca-certificates git python3 python3-pip python3-venv
          - name: Rocky Linux 9
            image: rockylinux:9
            bootstrap: >-
              dnf install -y -q bash ca-certificates git python3 python3-pip
    container:
      image: ${{ matrix.image }}

    steps:
      - name: Bootstrap test image
        run: ${{ matrix.bootstrap }}
      - uses: actions/checkout@v4
      - name: Run cross-distribution smoke tests
        shell: bash
        run: |
          python3 -m venv /tmp/ssr-panel-ci
          /tmp/ssr-panel-ci/bin/python -m pip install -q -r ssr-admin-panel/requirements.txt
          (cd ssr-admin-panel && /tmp/ssr-panel-ci/bin/python -m unittest discover -s tests -q)
          (cd ssr-server-optimizer && /tmp/ssr-panel-ci/bin/python -m unittest discover -s tests -q)
          bash -n ssr-admin-panel/*.sh ssr-admin-panel/scripts/*.sh ssr-server-optimizer/*.sh
