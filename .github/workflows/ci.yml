name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r anytls-panel/requirements.txt
          pip install -r ssr-admin-panel/requirements.txt
          pip install pytest flake8

      - name: Lint
        run: |
          flake8 anytls-panel/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 ssr-admin-panel/ --count --select=E9,F63,F7,F82 --show-source --statistics
          bash -n anytls-panel/*.sh ssr-admin-panel/*.sh ssr-admin-panel/scripts/*.sh ssr-server-optimizer/*.sh

      - name: Test
        run: |
          cd anytls-panel && python -m pytest tests/ -v
          cd ../ssr-admin-panel && python -m pytest tests/ -v
          cd ../ssr-server-optimizer && python -m pytest tests/ -v
