version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore"
      include: "scope"

  - package-ecosystem: "pip"
    directory: "/ssr-admin-panel"
    schedule:
      interval: "weekly"
    groups:
      python:
        patterns:
          - "*"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore"
      include: "scope"
